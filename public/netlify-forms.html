<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Formulários Plante</title>
  </head>
  <body>
    <form name="contato-plante" method="POST" data-netlify="true" netlify-honeypot="botField">
      <input type="hidden" name="form-name" value="contato-plante" />
      <input type="text" name="name" />
      <input type="text" name="company" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="service">
        <option value="Estratégia e Planejamento">Estratégia e Planejamento</option>
        <option value="Gestão de Redes Sociais">Gestão de Redes Sociais</option>
        <option value="Branding e Identidade Visual">Branding e Identidade Visual</option>
        <option value="Campanhas Institucionais">Campanhas Institucionais</option>
        <option value="Produção Audiovisual">Produção Audiovisual</option>
        <option value="Tráfego Pago e Mídia Digital">Tráfego Pago e Mídia Digital</option>
        <option value="Comunicação Institucional">Comunicação Institucional</option>
        <option value="Projetos Digitais">Projetos Digitais</option>
        <option value="Não sei ainda">Não sei ainda</option>
      </select>
      <textarea name="message"></textarea>
      <input type="text" name="botField" />
    </form>

    <form name="boa-jogada-plante" method="POST" data-netlify="true" netlify-honeypot="botField">
      <input type="hidden" name="form-name" value="boa-jogada-plante" />
      <input type="text" name="name" />
      <input type="tel" name="whatsapp" />
      <input type="text" name="instagram" />
      <input type="text" name="company" />
      <textarea name="answer"></textarea>
      <input type="text" name="action" />
      <input type="text" name="event" />
      <input type="text" name="consent" />
      <input type="text" name="createdAt" />
      <input type="text" name="botField" />
    </form>
  </body>
</html>
