<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Formulários Plante</title>
  </head>
  <body>
    <form name="contato-plante" method="POST" data-netlify="true" netlify-honeypot="botField">
      <input type="hidden" name="form-name" value="contato-plante" />
      <input type="text" name="name" />
      <input type="text" name="company" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="service">
        <option value="Estratégia e Planejamento">Estratégia e Planejamento</option>
        <option value="Branding e Identidade">Branding e Identidade</option>
        <option value="Conteúdo e Redes Sociais">Conteúdo e Redes Sociais</option>
        <option value="Tráfego Pago e Performance">Tráfego Pago e Performance</option>
        <option value="Audiovisual">Audiovisual</option>
        <option value="Comunicação Institucional">Comunicação Institucional</option>
        <option value="Projetos Digitais">Projetos Digitais</option>
        <option value="Não sei ainda">Não sei ainda</option>
      </select>
      <textarea name="message"></textarea>
      <input type="text" name="botField" />
    </form>
  </body>
</html>
